name: Docker Image

on:
  push:
    branches: [master, main, develop]
    paths:
      - "src/**"
      - "Dockerfile"
      - ".dockerignore"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/docker-image.yml"

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-scan-push:
    name: Build, scan, and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: image
        run: echo "image_name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          load: true
          tags: |
            ${{ steps.image.outputs.image_name }}:${{ github.sha }}
            ${{ steps.image.outputs.image_name }}:latest

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.image.outputs.image_name }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os,library
          exit-code: "1"

      - name: Push commit SHA tag
        run: docker push ${{ steps.image.outputs.image_name }}:${{ github.sha }}

      - name: Push latest tag
        if: ${{ github.ref_name == 'main' || github.ref_name == 'master' }}
        run: docker push ${{ steps.image.outputs.image_name }}:latest
