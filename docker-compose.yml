services:
  web:
    build:
      context: .
      target: development
    image: myapp:dev
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_CONFIG_PATH: /config/app.env
      APP_DATA_DIR: /data
    volumes:
      - .:/app
      - myapp-data:/data
      - ./config:/config:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  myapp-data:
